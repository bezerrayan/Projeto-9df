<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEAR 9º DF — Painel</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@font-face{
  font-family:"New Athletic M54";
  src:url("./fonts/New%20Athletic%20M54.ttf") format("truetype");
  font-display:swap;
}
/* admin UI font stack */
:root{
  --font-ui:"Segoe UI",Inter,system-ui,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
/* ── Reset ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-ui);
  font-size:14px;
  color:#0f172a;
  background:#f1f5f9;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font:inherit;outline:none}
img{display:block;max-width:100%}

/* ── Tokens ─────────────────────────────────────────── */
:root{
  --sidebar-w:240px;
  --topbar-h:60px;

  --c-bg:#f1f5f9;
  --c-surface:#ffffff;
  --c-surface-alt:#f8fafc;
  --c-border:#e2e8f0;
  --c-border-strong:#cbd5e1;

  --c-ink:#0f172a;
  --c-ink-2:#475569;
  --c-ink-3:#94a3b8;

  --c-blue:#2563eb;
  --c-blue-soft:#eff6ff;
  --c-blue-mid:#bfdbfe;
  --c-blue-dark:#1d4ed8;

  --c-green:#16a34a;
  --c-green-soft:#f0fdf4;
  --c-green-mid:#bbf7d0;

  --c-amber:#d97706;
  --c-amber-soft:#fffbeb;
  --c-amber-mid:#fde68a;

  --c-red:#dc2626;
  --c-red-soft:#fef2f2;
  --c-red-mid:#fecaca;

  --c-sidebar:#0f172a;
  --c-sidebar-item:#1e293b;
  --c-sidebar-text:#94a3b8;
  --c-sidebar-text-active:#f8fafc;
  --c-sidebar-active:#2563eb;

  --r-xs:6px;
  --r-sm:8px;
  --r-md:12px;
  --r-lg:16px;
  --r-xl:20px;

  --sh-xs:0 1px 2px rgba(0,0,0,.05);
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --sh-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
}

/* ── Layout shell ────────────────────────────────────── */
#shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-rows:var(--topbar-h) 1fr;
  height:100vh;
  overflow:hidden;
}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar{
  grid-row:1/-1;
  background:var(--c-sidebar);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-right:1px solid rgba(255,255,255,.04);
}
.sb-brand{
  height:var(--topbar-h);
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.sb-brand-icon{
  width:32px;height:32px;
  border-radius:var(--r-sm);
  background:var(--c-blue);
  display:grid;place-items:center;
  color:#fff;
  font-size:14px;
  flex-shrink:0;
}
.sb-brand-name{
  font-family:var(--font-ui);
  font-size:13px;
  font-weight:600;
  color:#f1f5f9;
  letter-spacing:.01em;
}
.sb-brand-sub{
  font-size:11px;
  color:var(--c-sidebar-text);
  margin-top:1px;
}
.sb-nav{
  flex:1;
  overflow-y:auto;
  padding:12px 8px;
}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px}
.sb-section{margin-bottom:18px}
.sb-section-label{
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--c-sidebar-text);
  padding:0 10px;
  margin-bottom:4px;
  opacity:.7;
}
.sb-item{
  display:flex;
  align-items:center;
  gap:9px;
  height:36px;
  padding:0 10px;
  border-radius:var(--r-sm);
  color:var(--c-sidebar-text);
  cursor:pointer;
  transition:background .15s,color .15s;
  font-size:13px;
  font-weight:500;
}
.sb-item i{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.sb-item:hover{background:var(--c-sidebar-item);color:#e2e8f0}
.sb-item.active{
  background:var(--c-blue);
  color:#fff;
}
.sb-footer{
  padding:12px 8px;
  border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.sb-user{
  display:flex;
  align-items:center;
  gap:9px;
  padding:8px 10px;
  border-radius:var(--r-sm);
  cursor:pointer;
  transition:background .15s;
}
.sb-user:hover{background:var(--c-sidebar-item)}
.sb-avatar{
  width:30px;height:30px;
  border-radius:var(--r-sm);
  background:var(--c-blue);
  display:grid;place-items:center;
  font-size:11px;
  font-weight:700;
  color:#fff;
  flex-shrink:0;
}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{
  font-size:12px;
  font-weight:600;
  color:#f1f5f9;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.sb-user-role{font-size:11px;color:var(--c-sidebar-text);margin-top:1px}
.sb-logout{
  width:28px;height:28px;
  display:grid;place-items:center;
  border-radius:var(--r-xs);
  color:var(--c-sidebar-text);
  transition:color .15s;
  font-size:12px;
}
.sb-logout:hover{color:#f87171}

/* ── Topbar ─────────────────────────────────────────── */
#topbar{
  background:var(--c-surface);
  border-bottom:1px solid var(--c-border);
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
  height:var(--topbar-h);
  flex-shrink:0;
  box-shadow:var(--sh-xs);
}
.topbar-title{
  font-family:var(--font-ui);
  font-size:15px;
  font-weight:600;
  color:var(--c-ink);
  letter-spacing:.01em;
}
.topbar-sub{
  font-size:12px;
  color:var(--c-ink-3);
  margin-top:1px;
}
.topbar-sep{flex:1}
.topbar-status{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--c-ink-2);
  font-weight:500;
}
#status-dot{
  width:7px;height:7px;
  border-radius:99px;
  background:var(--c-green);
  flex-shrink:0;
}
.btn-save{
  display:inline-flex;align-items:center;gap:6px;
  height:34px;padding:0 14px;
  border:none;border-radius:var(--r-sm);
  background:var(--c-blue);
  color:#fff;
  font-size:13px;font-weight:600;
  cursor:pointer;
  box-shadow:var(--sh-xs);
  transition:background .15s,opacity .15s;
}
.btn-save:hover{background:var(--c-blue-dark)}
.btn-save.saving{opacity:.6;pointer-events:none}

/* ── Content area ─────────────────────────────────────── */
#content-area{
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
  background:var(--c-bg);
}
#content-area::-webkit-scrollbar{width:6px}
#content-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}

/* ── Common components ────────────────────────────────── */
.card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  padding:18px 20px;
  box-shadow:var(--sh-sm);
}
.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}
.card-title{
  font-family:var(--font-ui);
  font-size:14px;
  font-weight:600;
  color:var(--c-ink);
  letter-spacing:.01em;
}
.card-desc{font-size:12px;color:var(--c-ink-3);margin-top:2px;line-height:1.5}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

/* hero banner */
.hero-banner{
  border-radius:var(--r-xl);
  background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,var(--c-blue) 100%);
  padding:24px 28px;
  color:#fff;
  position:relative;
  overflow:hidden;
  box-shadow:var(--sh-lg);
}
.hero-banner::before{
  content:"";
  position:absolute;right:-60px;top:-60px;
  width:200px;height:200px;
  border-radius:99px;
  background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);
}
.hero-banner h2{
  font-family:var(--font-ui);
  font-size:19px;
  font-weight:700;
  letter-spacing:-.01em;
  margin-bottom:6px;
}
.hero-banner p{font-size:13px;color:rgba(255,255,255,.75);line-height:1.6;max-width:640px}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.hero-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:18px;
}
.hero-stat{
  padding:12px 14px;
  border-radius:var(--r-md);
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
}
.hero-stat strong{display:block;font-size:17px;font-family:var(--font-ui);font-weight:700}
.hero-stat span{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;display:block}

/* stat tiles */
.stat-tile{
  padding:14px 16px;
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  box-shadow:var(--sh-xs);
}
.stat-tile small{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--c-ink-3)}
.stat-tile strong{display:block;font-size:20px;font-family:var(--font-ui);font-weight:700;color:var(--c-ink);margin-top:4px}
.stat-tile span{display:block;font-size:12px;color:var(--c-ink-3);margin-top:4px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:34px;padding:0 12px;
  border:1px solid var(--c-border);
  border-radius:var(--r-sm);
  background:var(--c-surface);
  color:var(--c-ink-2);
  font-size:12px;font-weight:600;
  cursor:pointer;
  transition:background .12s,border-color .12s,color .12s;
  box-shadow:var(--sh-xs);
}
.btn:hover{background:var(--c-surface-alt);border-color:var(--c-border-strong);color:var(--c-ink)}
.btn-primary{background:var(--c-blue);border-color:var(--c-blue);color:#fff;box-shadow:var(--sh-xs)}
.btn-primary:hover{background:var(--c-blue-dark);border-color:var(--c-blue-dark);color:#fff}
.btn-danger{background:var(--c-red-soft);border-color:var(--c-red-mid);color:var(--c-red)}
.btn-danger:hover{background:var(--c-red-mid);border-color:var(--c-red);color:var(--c-red)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--c-ink-2);box-shadow:none}
.btn-ghost:hover{background:var(--c-surface-alt);border-color:var(--c-border);color:var(--c-ink)}
.btn-sm{height:28px;padding:0 10px;font-size:11px}
.btn-xs{height:24px;padding:0 8px;font-size:11px}
.btn-icon{width:34px;padding:0;justify-content:center}
.btn-icon.btn-sm{width:28px}

/* badge */
.badge{
  display:inline-flex;align-items:center;
  height:20px;padding:0 8px;
  border-radius:99px;
  font-size:11px;font-weight:600;
}
.badge-blue{background:var(--c-blue-soft);color:var(--c-blue)}
.badge-green{background:var(--c-green-soft);color:var(--c-green)}
.badge-amber{background:var(--c-amber-soft);color:var(--c-amber)}
.badge-red{background:var(--c-red-soft);color:var(--c-red)}
.badge-gray{background:#f8fafc;color:var(--c-ink-3);border:1px solid var(--c-border)}

/* Form fields */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg:last-child{margin-bottom:0}
.fg label{font-size:12px;font-weight:600;color:var(--c-ink-2)}
.fg input,.fg select,.fg textarea{
  border:1px solid var(--c-border);
  border-radius:var(--r-sm);
  padding:7px 10px;
  font-size:13px;
  color:var(--c-ink);
  background:var(--c-surface);
  transition:border-color .12s,box-shadow .12s;
  line-height:1.4;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--c-blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.fg textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* editable item cards */
.item-card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-md);
  overflow:hidden;
  transition:border-color .15s;
}
.item-card.editing{border-color:var(--c-blue)}
.item-card-view{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:start;
  gap:12px;
  padding:14px 16px;
}
.item-title{font-size:13px;font-weight:600;color:var(--c-ink)}
.item-sub{font-size:12px;color:var(--c-ink-3);margin-top:2px}
.item-desc{font-size:12px;color:var(--c-ink-2);margin-top:6px;line-height:1.55}
.item-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.item-actions{display:flex;gap:5px;flex-shrink:0}
.item-edit-form{
  padding:14px 16px;
  border-top:1px solid var(--c-border);
  display:none;
  flex-direction:column;
  gap:0;
}
.item-edit-footer{
  display:flex;justify-content:flex-end;gap:6px;
  padding-top:10px;
  margin-top:10px;
  border-top:1px solid var(--c-border);
}

/* Item list */
.items-list{display:flex;flex-direction:column;gap:8px}

/* Notice */
.notice{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;
  border-radius:var(--r-md);
  background:var(--c-blue-soft);
  border:1px solid var(--c-blue-mid);
  font-size:12px;color:var(--c-blue);
  line-height:1.55;
}
.notice i{margin-top:1px;flex-shrink:0}
.notice-warn{background:var(--c-amber-soft);border-color:var(--c-amber-mid);color:var(--c-amber)}
.notice-success{background:var(--c-green-soft);border-color:var(--c-green-mid);color:var(--c-green)}

/* Empty state */
.empty-state{
  padding:32px 20px;
  text-align:center;
  color:var(--c-ink-3);
}
.empty-state i{font-size:24px;display:block;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px;line-height:1.6}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  padding:10px 12px;
  border-radius:var(--r-md);
  background:var(--c-surface);
  border:1px solid var(--c-border);
  box-shadow:var(--sh-xs);
}
.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* Tab strip */
.tab-strip{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.tab-btn{
  height:30px;padding:0 12px;
  border:1px solid transparent;
  border-radius:var(--r-sm);
  font-size:12px;font-weight:600;
  cursor:pointer;
  background:transparent;
  color:var(--c-ink-2);
  transition:all .12s;
}
.tab-btn:hover{background:var(--c-surface);border-color:var(--c-border);color:var(--c-ink)}
.tab-btn.active{background:var(--c-blue);color:#fff;border-color:var(--c-blue)}

/* Calendar */
.cal-shell{
  display:grid;
  grid-template-columns:1fr 280px;
  gap:14px;
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-wday{
  text-align:center;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--c-ink-3);
  padding:6px 0;
}
.cal-cell{
  aspect-ratio:1;
  display:grid;place-items:center;
  font-size:12px;font-weight:500;
  border-radius:var(--r-sm);
  color:var(--c-ink-2);
  cursor:default;
}
.cal-cell.empty{visibility:hidden}
.cal-cell.today{background:var(--c-blue);color:#fff;font-weight:700}
.cal-cell.has-ev{position:relative}
.cal-cell.has-ev::after{
  content:"";
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:99px;
  background:var(--c-green);
}
.cal-cell.has-ev.today::after{background:rgba(255,255,255,.8)}
.cal-cell.has-reg::after{background:var(--c-amber)}
.ev-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;padding-right:4px}
.ev-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;
  border-radius:var(--r-sm);
  border:1px solid var(--c-border);
  background:var(--c-surface);
}
.ev-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:12px;font-weight:600;color:var(--c-ink)}
.ev-date{font-size:11px;color:var(--c-ink-3);margin-top:2px}

/* Gallery grid */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}
.photo-card{
  border-radius:var(--r-md);
  overflow:hidden;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  box-shadow:var(--sh-xs);
}
.photo-thumb{
  aspect-ratio:4/3;
  background:var(--c-bg);
  overflow:hidden;
  display:grid;place-items:center;
}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb i{font-size:20px;color:var(--c-ink-3)}
.photo-info{padding:8px 10px}
.photo-name{font-size:12px;font-weight:600;color:var(--c-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-cat{font-size:11px;color:var(--c-ink-3);margin-top:2px}
.photo-actions{display:flex;gap:4px;padding:0 10px 8px}

/* Progress bar */
.prog-bar{height:4px;border-radius:99px;background:var(--c-border);overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:99px;background:var(--c-blue);transition:width .3s}

/* Toggle */
.tog{display:inline-flex;cursor:pointer;user-select:none}
.tog input{display:none}
.tog-sl{
  width:36px;height:20px;
  border-radius:99px;
  background:var(--c-border);
  position:relative;
  transition:background .15s;
}
.tog-sl::after{
  content:"";
  position:absolute;top:3px;left:3px;
  width:14px;height:14px;
  border-radius:99px;
  background:#fff;
  box-shadow:var(--sh-xs);
  transition:transform .15s;
}
.tog input:checked + .tog-sl{background:var(--c-blue)}
.tog input:checked + .tog-sl::after{transform:translateX(16px)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(15,23,42,.5);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--c-surface);
  border-radius:var(--r-xl);
  padding:24px;
  width:100%;max-width:460px;
  box-shadow:var(--sh-lg);
  border:1px solid var(--c-border);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.modal-head h3{font-family:var(--font-ui);font-size:15px;font-weight:600}
.modal-close{
  width:28px;height:28px;
  display:grid;place-items:center;
  border:1px solid var(--c-border);
  border-radius:var(--r-sm);
  background:transparent;
  color:var(--c-ink-2);
  cursor:pointer;font-size:14px;
}
.modal-close:hover{background:var(--c-surface-alt)}
.modal-foot{
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid var(--c-border);
}

/* Ramos tabs */
.ramo-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ramo-tab{
  height:32px;padding:0 14px;
  border-radius:var(--r-sm);
  font-size:12px;font-weight:600;
  cursor:pointer;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  color:var(--c-ink-2);
  transition:all .12s;
}
.ramo-tab:hover{border-color:var(--c-blue);color:var(--c-blue)}
.ramo-tab.active{background:var(--c-blue);border-color:var(--c-blue);color:#fff}

/* Dashboard — branch bar */
.branch-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.branch-item{padding:10px 12px;border-radius:var(--r-md);background:var(--c-surface-alt);border:1px solid var(--c-border)}
.branch-item small{font-size:11px;color:var(--c-ink-3)}
.branch-item strong{display:block;font-size:17px;font-weight:700;font-family:var(--font-ui);margin-top:2px}

/* Toast */
#toast{
  position:fixed;right:20px;bottom:20px;z-index:2000;
  display:flex;align-items:center;gap:8px;
  min-height:44px;padding:0 16px;
  border-radius:var(--r-md);
  background:#0f172a;color:#f8fafc;
  font-size:13px;font-weight:500;
  box-shadow:var(--sh-lg);
  opacity:0;transform:translateY(12px);
  pointer-events:none;
  transition:all .2s ease;
}
#toast.show{opacity:1;transform:translateY(0)}
#toast i{color:#60a5fa}

/* Scrollbar utility */
.scroll-y{overflow-y:auto;max-height:340px;padding-right:4px}
.scroll-y::-webkit-scrollbar{width:4px}
.scroll-y::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:99px}

/* Search */
.search-wrap{
  position:relative;
  display:inline-flex;align-items:center;
}
.search-wrap i{position:absolute;left:9px;color:var(--c-ink-3);font-size:12px}
.search-wrap input{
  height:32px;padding:0 10px 0 28px;
  border:1px solid var(--c-border);
  border-radius:var(--r-sm);
  font-size:12px;
  background:var(--c-surface);
  color:var(--c-ink);
  min-width:200px;
}
.search-wrap input:focus{border-color:var(--c-blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* Responsive */
@media(max-width:1100px){
  :root{--sidebar-w:200px}
  .hero-stats{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .cal-shell{grid-template-columns:1fr}
}
@media(max-width:780px){
  :root{--sidebar-w:0px}
  #sidebar{display:none}
  .hero-stats{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
  .branch-bar{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
