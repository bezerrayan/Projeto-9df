<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEAR 9º DF — Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--b9:#0a1f3c;--b8:#0d2d5a;--b7:#0f3d7a;--b6:#0a52a8;--b5:#0071e3;--b4:#2389f5;--b3:#5aaeff;--b2:#a8d4ff;--b1:#d6ebff;--b0:#eaf4ff;--sky:#dbefff;--white:#fff;--g50:#f7f9fc;--g100:#eef2f7;--g200:#dde4ee;--g400:#9aa5b8;--g600:#5a6478;--g800:#1e2535;--ink:#0d1421;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;--r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;--sh-sm:0 1px 4px rgba(0,60,160,.07);--sh-md:0 4px 18px rgba(0,60,160,.11);--sh-lg:0 12px 40px rgba(0,60,160,.16);--side:240px;--nav:60px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--g50);-webkit-font-smoothing:antialiased;overflow:hidden}a{text-decoration:none;color:inherit}button,input,select,textarea{font-family:inherit}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g200);border-radius:10px}
#app{display:flex;height:100vh;overflow:hidden}.sidebar{width:var(--side);flex-shrink:0;background:var(--b9);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:.3s}.sb-head{padding:16px;border-bottom:1px solid rgba(255,255,255,.07)}.sb-logo{display:flex;align-items:center;gap:10px}.sb-logo-ic{width:34px;height:34px;background:var(--b5);border-radius:9px;display:grid;place-items:center;color:#fff;font-size:.85rem;flex-shrink:0}.sb-logo-name{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:#fff;line-height:1.1}.sb-logo-sub{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:1px}.sb-nav{flex:1;overflow-y:auto;padding:10px 0}.sb-section{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:12px 18px 4px}.sb-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:.82rem;color:rgba(255,255,255,.55);cursor:pointer;border-left:2px solid transparent;transition:.15s}.sb-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}.sb-item.on{color:#fff;background:rgba(0,113,227,.25);border-left-color:var(--b4);font-weight:600}.sb-item i{width:15px;text-align:center;font-size:.8rem}.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--b5);display:grid;place-items:center;color:#fff;font-size:.75rem;font-weight:700;flex-shrink:0}.sb-user{flex:1}.sb-user-name{font-size:.78rem;color:#fff;font-weight:600}.sb-user-role{font-size:.65rem;color:rgba(255,255,255,.4)}.sb-logout{color:rgba(255,255,255,.4);cursor:pointer;font-size:.82rem;transition:.15s}.sb-logout:hover{color:var(--danger)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.topbar{height:var(--nav);background:var(--white);border-bottom:1px solid var(--g100);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:var(--sh-sm)}.topbar-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--b9);flex:1}.topbar-badge{background:var(--b0);color:var(--b6);font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid var(--b1)}.topbar-save{background:var(--b5);color:#fff;border:none;border-radius:var(--r-md);padding:7px 18px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}.topbar-save:hover{background:var(--b4)}.topbar-save.saving{opacity:.7;pointer-events:none}.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.on{display:block}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}.metric{background:var(--white);border:1px solid var(--g100);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh-sm)}.metric-lbl{font-size:.72rem;font-weight:600;color:var(--g600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.metric-val{font-size:1.6rem;font-weight:700;color:var(--b9);line-height:1}.metric-sub{font-size:.75rem;color:var(--success);margin-top:4px;display:flex;align-items:center;gap:4px}.card{background:var(--white);border:1px solid var(--g100);border-radius:var(--r-lg);padding:20px;margin-bottom:16px;box-shadow:var(--sh-sm)}.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.card-head h3{font-size:.9rem;font-weight:700;color:var(--b9)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-md);border:1px solid var(--g200);background:var(--white);color:var(--ink);cursor:pointer;font-size:.8rem;font-weight:600;transition:.15s;font-family:inherit}.btn:hover{background:var(--g50);border-color:var(--g400)}.btn-primary{background:var(--b5);color:#fff;border-color:var(--b5);box-shadow:0 2px 8px rgba(0,113,227,.25)}.btn-primary:hover{background:var(--b4);border-color:var(--b4)}.btn-ghost{background:transparent;border-color:var(--b2);color:var(--b6)}.btn-ghost:hover{background:var(--b0)}.btn-danger{background:transparent;color:var(--danger);border-color:#ffc9c9}.btn-danger:hover{background:#fff1f0}.btn-sm{padding:5px 11px;font-size:.75rem}.btn-xs{padding:3px 8px;font-size:.72rem}.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:.7rem;font-weight:700}.b-blue{background:var(--b0);color:var(--b7);border:1px solid var(--b1)}.b-green{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}.b-amber{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}.b-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}.b-gray{background:var(--g100);color:var(--g600);border:1px solid var(--g200)}
table{width:100%;border-collapse:collapse;font-size:.82rem}th{text-align:left;font-size:.68rem;font-weight:700;color:var(--g600);padding:6px 10px;border-bottom:1px solid var(--g100);letter-spacing:.06em;text-transform:uppercase}td{padding:11px 10px;border-bottom:1px solid var(--g100);color:var(--ink);vertical-align:middle}tr:last-child td{border-bottom:none}.td-actions{display:flex;gap:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fg{margin-bottom:14px}.fg label{display:block;font-size:.75rem;font-weight:600;color:var(--g800);margin-bottom:5px}.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border-radius:var(--r-md);border:1.5px solid var(--g200);background:var(--g50);font-size:.85rem;color:var(--ink);transition:.18s}.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--b5);background:#fff;box-shadow:0 0 0 3px var(--b0)}.fg textarea{resize:vertical;min-height:80px}
.ai-box{background:linear-gradient(135deg,var(--b0),#f0f7ff);border:1px solid var(--b1);border-radius:var(--r-lg);padding:16px;margin-bottom:16px}.ai-box-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}.ai-box-head i{color:var(--b5)}.ai-box-head span{font-size:.82rem;font-weight:700;color:var(--b8)}.ai-input-row{display:flex;gap:8px}.ai-input{flex:1;padding:9px 12px;border-radius:var(--r-md);border:1.5px solid var(--b1);background:#fff;font-size:.83rem;color:var(--ink);font-family:inherit}.ai-result{background:#fff;border:1px solid var(--b1);border-radius:var(--r-md);padding:12px;margin-top:10px;font-size:.83rem;color:var(--ink);line-height:1.65;min-height:48px;display:none}.ai-result.show{display:block}
.act-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--g100)}.act-item:last-child{border-bottom:none}.act-dot{width:8px;height:8px;border-radius:50%;background:var(--b5);margin-top:4px;flex-shrink:0}.act-text{font-size:.8rem;flex:1;line-height:1.5}.act-time{font-size:.72rem;color:var(--g400)}
.cal-grid-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}.cal-wday{text-align:center;font-size:.65rem;font-weight:700;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;padding:5px 0}.cal-day{text-align:center;padding:6px 4px;border-radius:var(--r-sm);font-size:.8rem;color:var(--g600);position:relative}.cal-day.has-ev{background:var(--b0);color:var(--b6);font-weight:700}.cal-day.today{background:var(--b5);color:#fff;font-weight:700}.cal-day.empty{visibility:hidden}.cal-day::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;opacity:0}.cal-day.has-ev::after{opacity:1;background:var(--b5)}.cal-day.has-reg::after{background:var(--success)}.cal-day.today::after{display:none}.cal-ev-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-md);background:var(--g50);border:1px solid var(--g100);margin-bottom:7px}.cal-ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.cal-ev-info{flex:1}.cal-ev-title{font-size:.82rem;font-weight:600;color:var(--b9)}.cal-ev-date{font-size:.72rem;color:var(--g400);margin-top:1px}
.photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.photo-item{border-radius:var(--r-md);overflow:hidden;aspect-ratio:1;background:var(--g100);border:1px solid var(--g200);position:relative}.photo-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--g400);font-size:.72rem;text-align:center;padding:4px;flex-direction:column}.photo-ov{position:absolute;inset:0;background:rgba(10,31,60,.6);display:none;align-items:center;justify-content:center;gap:6px}.photo-item:hover .photo-ov{display:flex}.photo-cat{position:absolute;top:5px;left:5px;font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:4px}
.proj-card{background:var(--white);border:1px solid var(--g100);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:var(--sh-sm)}.proj-icon{width:42px;height:42px;border-radius:var(--r-md);display:grid;place-items:center;font-size:1.2rem;flex-shrink:0}.prog-bar{height:5px;background:var(--g100);border-radius:3px;overflow:hidden;margin-top:8px}.prog-fill{height:100%;background:var(--b5);border-radius:3px}
.ramo-tab{padding:8px 16px;font-size:.82rem;cursor:pointer;color:var(--g600);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;font-weight:600}.ramo-tab.on{color:var(--b5);border-bottom-color:var(--b5)}.ramo-tabs{display:flex;gap:0;border-bottom:1px solid var(--g100);margin-bottom:20px;flex-wrap:wrap}
.tog{position:relative;display:inline-block;width:38px;height:21px}.tog input{opacity:0;width:0;height:0}.tog-sl{position:absolute;cursor:pointer;inset:0;background:var(--g200);border-radius:11px;transition:.2s}.tog input:checked+.tog-sl{background:var(--b5)}.tog-sl::before{content:'';position:absolute;height:15px;width:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}.tog input:checked+.tog-sl::before{transform:translateX(17px)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px)}.modal-overlay.open{display:flex}.modal-box{background:var(--white);border-radius:var(--r-xl);padding:26px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:var(--sh-lg);border:1px solid var(--g100)}.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.modal-head h3{font-size:1rem;font-weight:700;color:var(--b9)}.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--g100);color:var(--g600);cursor:pointer;font-size:.9rem;display:grid;place-items:center}.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--g100)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--b9);color:#fff;padding:12px 20px;border-radius:var(--r-lg);font-size:.83rem;font-weight:600;box-shadow:var(--sh-lg);z-index:9999;display:flex;align-items:center;gap:8px;transform:translateY(60px);opacity:0;transition:.3s;pointer-events:none}.toast.show{transform:translateY(0);opacity:1}.toast i{color:var(--b3)}
.notice{display:flex;align-items:center;gap:8px;background:var(--b0);border:1px solid var(--b1);border-radius:var(--r-md);padding:10px 14px;font-size:.8rem;color:var(--b7);margin-bottom:14px}.notice.success{background:#d1fae5;border-color:#a7f3d0;color:#065f46}
.search-wrap{position:relative;flex:1}.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:.78rem}.search-wrap input{width:100%;padding:8px 12px 8px 32px;border-radius:var(--r-md);border:1px solid var(--g200);background:var(--g50);font-size:.83rem;color:var(--ink)}
.mv{width:32px;height:32px;border-radius:50%;display:inline-grid;place-items:center;font-size:.72rem;font-weight:700;flex-shrink:0}.empty-state{text-align:center;padding:40px 20px;color:var(--g400)}.empty-state i{font-size:2.5rem;display:block;margin-bottom:12px;opacity:.4}.empty-state p{font-size:.85rem}
@media (max-width:1100px){.metrics{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}.photo-grid{grid-template-columns:repeat(3,1fr)}}@media (max-width:820px){.sidebar{width:80px}.sb-logo-name,.sb-logo-sub,.sb-section,.sb-user,.sb-item span{display:none}.sb-item{justify-content:center;padding:10px}.sb-foot{justify-content:center}.topbar{padding:0 14px}.content{padding:16px}.photo-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <div class="sb-logo-ic"><i class="fas fa-compass"></i></div>
        <div><div class="sb-logo-name">GEAR 9º DF</div><div class="sb-logo-sub">Admin Panel</div></div>
      </div>
    </div>
    <div class="sb-nav" id="sidebar-nav"></div>
    <div class="sb-foot">
      <div class="sb-avatar">AD</div>
      <div class="sb-user"><div class="sb-user-name" id="admin-email-short">Admin</div><div class="sb-user-role">administrador</div></div>
      <i class="fas fa-sign-out-alt sb-logout" id="logout-button" title="Sair"></i>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-badge" id="save-status-badge"><i class="fas fa-circle" style="color:var(--success);font-size:.5rem;margin-right:4px"></i>Pronto</div>
      <button class="topbar-save" id="save-btn"><i class="fas fa-save"></i> Salvar</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg">Alterações salvas!</span></div>
<script src="admin.js"></script>
</body>
</html>
