<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | GEAR 9º DF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --font-admin-ui: "Segoe UI", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
        body { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(180deg, #eff6ff 0%, #d9eaff 100%); font-family: var(--font-admin-ui); }
        .login-shell { width: min(460px, calc(100vw - 32px)); padding: 34px; background: rgba(255,255,255,.96); border: 1px solid rgba(13,45,90,.08); border-radius: 28px; box-shadow: 0 20px 48px rgba(13,45,90,.10); }
        .login-shell h1 { font-family: var(--font-admin-ui); font-size: 1.9rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: 10px; }
        .login-shell p { color: var(--muted); margin-bottom: 22px; font-size: .96rem; line-height: 1.75; letter-spacing: .01em; }
        .login-form { display: grid; gap: 16px; }
        .login-form label { display: grid; gap: 7px; font-weight: 600; color: var(--ink); font-size: .92rem; letter-spacing: .01em; }
        .login-form input { width: 100%; border: 1px solid rgba(13,45,90,.14); border-radius: 14px; padding: 14px 16px; font: 500 0.95rem/1.4 var(--font-admin-ui); background: #fff; }
        .login-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
        .login-feedback { min-height: 22px; font-size: 0.9rem; color: #b42318; }
        .login-back { color: var(--blue-700); font-weight: 600; }
        .login-hint { margin-top: 6px; font-size: 0.86rem; line-height: 1.65; letter-spacing: .01em; color: var(--muted); }
        .login-shell .eyebrow { font-family: var(--font-admin-ui); font-size: .74rem; letter-spacing: .08em; }
        .login-shell .btn { font-family: var(--font-admin-ui); font-weight: 600; }
    </style>
</head>
<body>
    <main class="login-shell">
        <div class="eyebrow">Área administrativa</div>
        <h1>Painel do 9º DF</h1>
        <p>Entre com um e-mail autorizado e senha para editar textos, imagens, seções e conteúdos do site.</p>
        <div class="login-hint">Este painel funciona quando o site está rodando pelo backend local do projeto. Em ambiente estático, o login não autentica.</div>

        <form class="login-form" id="loginForm">
            <label>
                E-mail autorizado
                <input type="email" id="loginEmail" autocomplete="username" required>
            </label>
            <label>
                Senha
                <input type="password" id="loginPassword" autocomplete="current-password" required>
            </label>
            <div class="login-feedback" id="loginFeedback"></div>
            <div class="login-actions">
                <button type="submit" class="btn btn-primary">Entrar no painel</button>
                <a href="index.html" class="btn btn-outline">Voltar ao site</a>
            </div>
        </form>
    </main>

    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var feedback = document.getElementById('loginFeedback');
            var params = new URLSearchParams(window.location.search);
            var nextPage = params.get('next') || 'index.html';

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                feedback.textContent = '';

                var email = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;

                try {
                    var response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: password })
                    });

                    if (response.status === 401) {
                        feedback.textContent = 'E-mail ou senha inválidos.';
                        return;
                    }

                    if (!response.ok) {
                        feedback.textContent = 'O backend do painel não está disponível aqui. Use o servidor local para acessar o admin.';
                        return;
                    }

                    window.location.href = '/admin?page=' + encodeURIComponent(nextPage);
                } catch (error) {
                    feedback.textContent = 'Não foi possível conectar ao servidor agora.';
                }
            });
        })();
    </script>
</body>
</html>
